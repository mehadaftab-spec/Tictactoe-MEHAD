html, body, #canvas {

#status, #status-splash, #status-progress {

}

#status, #status-splash {

}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;

}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

#audio-ui {
	position: fixed;
	inset: 0;
	z-index: 9999;
	pointer-events: none;
	font-family: Arial, Helvetica, sans-serif;
}

.audio-control-button {
	align-items: center;
	border: 2px solid rgba(151, 112, 47, 0.85);
	border-radius: 999px;
	background: linear-gradient(180deg, rgba(35, 101, 45, 0.95), rgba(20, 73, 31, 0.96));
	color: #ffffff;
	box-shadow: 0 8px 24px rgba(0, 0, 0, 0.42);
	cursor: pointer;
	display: inline-flex;
	font-size: 11px;
	font-weight: 800;
	gap: 8px;
	justify-content: center;
	line-height: 1;
	min-height: 32px;
	min-width: 86px;
	padding: 0 10px;
	pointer-events: auto;
	touch-action: manipulation;
	white-space: nowrap;
}

.audio-control-button::before {
	background: #ffffff;
	border-radius: 999px;
	box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
	content: "";
	height: 14px;
	width: 14px;
}

.audio-control-button.is-off {
	background: linear-gradient(180deg, rgba(70, 70, 70, 0.96), rgba(38, 38, 38, 0.97));
	border-color: rgba(130, 130, 130, 0.86);
	color: rgba(230, 230, 230, 0.86);
	filter: grayscale(1);
}

.audio-control-button.is-off::before {
	background: #b8b8b8;
}

.audio-control-button:focus-visible {
	outline: 2px solid #ffffff;
	outline-offset: 3px;
}

#html-music-toggle {
	position: absolute;
	right: calc(max(12px, env(safe-area-inset-right)) + 70px);
	top: max(12px, env(safe-area-inset-top));
}

#audio-unlock {
	left: max(10px, env(safe-area-inset-left));
	position: absolute;
	top: max(10px, env(safe-area-inset-top));
	min-width: 106px;
}

#audio-unlock.is-hidden {
	display: none;
}

@media (max-width: 520px) {
	.audio-control-button {
		font-size: 10px;
		min-height: 28px;
		min-width: 76px;
		padding: 0 7px;
	}

	.audio-control-button::before {
		height: 12px;
		width: 12px;
	}

	#html-music-toggle {
		right: calc(max(12px, env(safe-area-inset-right)) + 62px);
	}
}

		<div id="status">

			<progress id="status-progress"></progress>
			<div id="status-notice"></div>

		<div id="audio-ui" aria-label="Audio controls">
			<button id="html-music-toggle" class="audio-control-button" type="button" aria-pressed="true">MUSIC ON</button>
			<button id="audio-unlock" class="audio-control-button" type="button">Enable music</button>

		<script>
(function () {
	const MUSIC_MIN_DURATION_SECONDS = 6;
	const audioState = {
		contexts: [],
		gains: {
			music: new Set(),
			sfx: new Set(),
		},
		music: localStorage.getItem('ttt_music_enabled') !== 'false',
		sfx: localStorage.getItem('ttt_sfx_enabled') !== 'false',
		userRequestedAudio: false,
	};

	window.__tttAudioState = audioState;

	function getButton(id) {
		return document.getElementById(id);
	}

	function classifySource(source) {
		const buffer = source.buffer;
		const duration = buffer && Number.isFinite(buffer.duration) ? buffer.duration : 0;
		return source.loop || duration >= MUSIC_MIN_DURATION_SECONDS ? 'music' : 'sfx';
	}

	function applyGain(gain, enabled) {
		const value = enabled ? 1 : 0;
		try {
			const now = gain.context.currentTime;
			gain.gain.cancelScheduledValues(now);
			gain.gain.setTargetAtTime(value, now, 0.015);
		} catch (err) {
			gain.gain.value = value;
		}
	}

	function refreshGains() {
		audioState.gains.music.forEach((gain) => applyGain(gain, audioState.music));
		audioState.gains.sfx.forEach((gain) => applyGain(gain, audioState.sfx));
	}

	function updateButtons() {
		document.documentElement.dataset.music = audioState.music ? 'on' : 'off';
		document.documentElement.dataset.sfx = audioState.sfx ? 'on' : 'off';
		const musicButton = getButton('html-music-toggle');
		if (musicButton) {
			musicButton.textContent = audioState.music ? 'MUSIC ON' : 'MUSIC OFF';
			musicButton.setAttribute('aria-pressed', String(audioState.music));
			musicButton.classList.toggle('is-off', !audioState.music);
		}
	}

	function updateUnlockButton() {
		const unlockButton = getButton('audio-unlock');
		if (!unlockButton) {
			return;
		}
		const hasRunningAudio = audioState.contexts.some((context) => context.state === 'running');
		unlockButton.classList.toggle('is-hidden', !audioState.music || audioState.userRequestedAudio || hasRunningAudio);
	}

	function resumeContexts() {
		audioState.userRequestedAudio = true;
		if (!audioState.music) {
			updateUnlockButton();
			return Promise.resolve();
		}
		const resumeJobs = audioState.contexts.map((context) => {
			if (context.state === 'running') {
				return Promise.resolve();
			}
			return context.resume().catch(() => undefined);
		});
		return Promise.all(resumeJobs).then(updateUnlockButton);
	}

	function suspendContexts() {
		const suspendJobs = audioState.contexts.map((context) => {
			if (context.state !== 'running') {
				return Promise.resolve();
			}
			return context.suspend().catch(() => undefined);
		});
		return Promise.all(suspendJobs).then(updateUnlockButton);
	}

	function toggleMusic() {
		audioState.music = !audioState.music;
		localStorage.setItem('ttt_music_enabled', String(audioState.music));
		refreshGains();
		updateButtons();
		if (audioState.music) {
			resumeContexts();
		} else {
			suspendContexts();
		}
	}

	function toggleSfx() {
		audioState.sfx = !audioState.sfx;
		localStorage.setItem('ttt_sfx_enabled', String(audioState.sfx));
		refreshGains();
		updateButtons();
	}

	function getTopRightAudioHotspot(event) {
		const width = window.innerWidth || document.documentElement.clientWidth;
		const height = window.innerHeight || document.documentElement.clientHeight;
		const topLimit = Math.max(70, Math.min(110, height * 0.12));
		if (event.clientY > topLimit) {
			return null;
		}

		const buttonWidth = Math.min(66, Math.max(46, width * 0.075));
		const gap = Math.max(6, width * 0.01);
		const rightPad = Math.max(12, width * 0.035);
		const sfxLeft = width - rightPad - buttonWidth;
		const musicLeft = sfxLeft - gap - buttonWidth;

		if (event.clientX >= musicLeft && event.clientX <= musicLeft + buttonWidth) {
			return 'music';
		}
		if (event.clientX >= sfxLeft && event.clientX <= sfxLeft + buttonWidth) {
			return 'sfx';
		}
		return null;
	}

	function registerContext(context) {
		if (context.__tttRegistered) {
			return context;
		}
		context.__tttRegistered = true;
		patchSourceRouting();
		audioState.contexts.push(context);
		if (typeof context.addEventListener === 'function') {
			context.addEventListener('statechange', updateUnlockButton);
		}
		if (audioState.userRequestedAudio && context.state !== 'running') {
			context.resume().catch(() => undefined).then(updateUnlockButton);
		}
		updateUnlockButton();
		return context;
	}

	function patchAudioContext(key) {
		const NativeAudioContext = window[key];
		if (!NativeAudioContext || NativeAudioContext.__tttWrapped) {
			return;
		}
		function WrappedAudioContext() {
			const context = new NativeAudioContext(...Array.from(arguments));
			return registerContext(context);
		}
		Object.setPrototypeOf(WrappedAudioContext, NativeAudioContext);
		WrappedAudioContext.prototype = NativeAudioContext.prototype;
		WrappedAudioContext.__tttWrapped = true;
		window[key] = WrappedAudioContext;
	}

	function patchSourceRouting() {
		const SourceNode = window.AudioBufferSourceNode;
		if (!SourceNode || SourceNode.prototype.__tttRoutingPatched) {
			return;
		}
		const nativeConnect = SourceNode.prototype.connect;
		SourceNode.prototype.connect = function () {
			const destination = arguments[0];
			const isAudioParam = window.AudioParam && destination instanceof AudioParam;
			const isPositionWorklet = destination && destination.constructor && destination.constructor.name === 'AudioWorkletNode';
			if (!destination || isAudioParam || isPositionWorklet || !this.buffer) {
				return nativeConnect.apply(this, arguments);
			}

			const connectArgs = Array.prototype.slice.call(arguments, 1);
			if (!this.__tttRoutingGain) {
				const category = classifySource(this);
				const gain = this.context.createGain();
				this.__tttRoutingGain = gain;
				this.__tttAudioCategory = category;
				audioState.gains[category].add(gain);
				applyGain(gain, audioState[category]);
				nativeConnect.call(this, gain);
			}
			return this.__tttRoutingGain.connect(destination, ...connectArgs);
		};
		SourceNode.prototype.__tttRoutingPatched = true;
	}

	function bindAudioControls() {
		const musicButton = getButton('html-music-toggle');
		const unlockButton = getButton('audio-unlock');

		function stopGameClick(event) {
			event.preventDefault();
			event.stopPropagation();
		}

		function stopGamePointer(event) {
			event.stopPropagation();
		}

		if (musicButton) {
			musicButton.addEventListener('pointerdown', stopGamePointer);
			musicButton.addEventListener('click', (event) => {
				stopGameClick(event);
				toggleMusic();
			});
		}

		if (unlockButton) {
			unlockButton.addEventListener('pointerdown', stopGamePointer);
			unlockButton.addEventListener('click', (event) => {
				stopGameClick(event);
				resumeContexts();
			});
		}
		document.addEventListener('pointerdown', () => {
			resumeContexts();
		}, { capture: true, once: true });
		updateButtons();
		if (!audioState.music) {
			suspendContexts();
		}
		updateUnlockButton();
	}

	patchAudioContext('AudioContext');
	patchAudioContext('webkitAudioContext');
	patchSourceRouting();
	bindAudioControls();
}());

const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":1858200,"index.wasm":35749181},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
